services:
  streamlit:
    build:
      context: python
      dockerfile: Dockerfile
    container_name: streamlit
    hostname: streamlit
    working_dir: "/workspace"
    volumes:
      - .:/workspace
    ports:
      - "8501:8501"
      - "5678:5678"
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      TZ: Asia/Tokyo
    tty: true
    stdin_open: true
